<svg xmlns="http://www.w3.org/2000/svg" width="4200" height="700" viewBox="0 0 4200 700">
  <defs>
    <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M70 0H0V70" fill="none" stroke="#f41e22" stroke-opacity="0.095" stroke-width="2"/>
    </pattern>
    <radialGradient id="leftGlow" cx="24%" cy="50%" r="48%">
      <stop offset="0" stop-color="#f41e22" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#f41e22" stop-opacity="0.045"/>
      <stop offset="1" stop-color="#05090f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="76%" cy="50%" r="42%">
      <stop offset="0" stop-color="#193d67" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#05090f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="redLine" x1="0" x2="1">
      <stop offset="0" stop-color="#f41e22" stop-opacity="0"/>
      <stop offset="0.13" stop-color="#f41e22" stop-opacity="0.82"/>
      <stop offset="0.87" stop-color="#f41e22" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#f41e22" stop-opacity="0"/>
    </linearGradient>
    <filter id="redGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="4200" height="700" fill="#05090f"/>
  <rect width="4200" height="700" fill="url(#grid)"/>
  <rect width="4200" height="700" fill="url(#leftGlow)"/>
  <rect width="4200" height="700" fill="url(#rightGlow)"/>
  <rect x="180" y="66" width="3840" height="2" fill="url(#redLine)"/>
  <rect x="180" y="632" width="3840" height="2" fill="url(#redLine)"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <!-- LinkedIn overlays the Page logo at the lower left, so brand content begins after that zone. -->
    <text x="815" y="145" fill="#7889a1" font-size="24" font-weight="700" letter-spacing="8">SECURITY OPERATIONS // CONTINUOUS</text>
    <image href="../wordmark.png" x="800" y="195" width="1280" height="192" preserveAspectRatio="xMinYMid meet"/>
    <text x="818" y="472" fill="#eef2f9" font-size="43" font-weight="700" letter-spacing="7">CONTINUOUS AI SECURITY TESTING</text>
    <text x="820" y="534" fill="#aebbd0" font-size="28" letter-spacing="3.5">FROM FIRST REPORT TO CUSTOMER-READY EVIDENCE</text>

    <text x="2170" y="128" fill="#7889a1" font-size="22" font-weight="700" letter-spacing="6">ASSESSMENT://MULTI-SURFACE</text>

    <g>
      <rect x="2170" y="172" width="490" height="92" rx="12" fill="#0b1422" stroke="#213653" stroke-width="2"/>
      <circle cx="2213" cy="218" r="8" fill="#f41e22"/>
      <text x="2240" y="226" fill="#e8eef8" font-size="28" font-weight="700" letter-spacing="3">SOURCE CODE</text>

      <rect x="2170" y="304" width="490" height="92" rx="12" fill="#0b1422" stroke="#213653" stroke-width="2"/>
      <circle cx="2213" cy="350" r="8" fill="#f41e22"/>
      <text x="2240" y="358" fill="#e8eef8" font-size="28" font-weight="700" letter-spacing="3">SHIPPED BINARY</text>

      <rect x="2170" y="436" width="490" height="92" rx="12" fill="#0b1422" stroke="#213653" stroke-width="2"/>
      <circle cx="2213" cy="482" r="8" fill="#f41e22"/>
      <text x="2240" y="490" fill="#e8eef8" font-size="28" font-weight="700" letter-spacing="3">LIVE APPLICATION</text>
    </g>

    <g fill="none" stroke="#f41e22" stroke-width="3" stroke-linecap="round" stroke-opacity="0.75">
      <path d="M2660 218C2805 218 2818 350 2915 350"/>
      <path d="M2660 350H2915"/>
      <path d="M2660 482C2805 482 2818 350 2915 350"/>
    </g>
    <g fill="#05090f" stroke="#f41e22" stroke-width="6" filter="url(#redGlow)">
      <circle cx="2915" cy="350" r="13"/>
    </g>

    <rect x="3000" y="244" width="445" height="212" rx="18" fill="#0b1422" stroke="#f41e22" stroke-width="3"/>
    <text x="3222" y="306" text-anchor="middle" fill="#f41e22" font-size="20" font-weight="700" letter-spacing="5">ZEROQUARRY</text>
    <text x="3222" y="364" text-anchor="middle" fill="#eef2f9" font-size="34" font-weight="700" letter-spacing="2">CHALLENGE</text>
    <text x="3222" y="409" text-anchor="middle" fill="#aebbd0" font-size="25" letter-spacing="2">VALIDATE  •  RETEST</text>

    <path d="M3445 350H3590" fill="none" stroke="#f41e22" stroke-width="3" stroke-linecap="round"/>
    <circle cx="3590" cy="350" r="9" fill="#f41e22"/>

    <rect x="3650" y="244" width="330" height="212" rx="18" fill="#0b1422" stroke="#3e8b74" stroke-width="2"/>
    <text x="3815" y="310" text-anchor="middle" fill="#5bd3a7" font-size="21" font-weight="700" letter-spacing="5">PROOF</text>
    <text x="3815" y="365" text-anchor="middle" fill="#eef2f9" font-size="31" font-weight="700">REPORTS</text>
    <text x="3815" y="411" text-anchor="middle" fill="#aebbd0" font-size="24">EVIDENCE</text>

    <text x="2170" y="590" fill="#65758e" font-size="21" letter-spacing="3">FIND THE RISK  •  PROVE THE FIX  •  ANSWER THE CUSTOMER</text>
  </g>
</svg>
